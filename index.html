    <script>

    <script>
      const video = document.getElementById('bg-video');
      const startTime = 30; // seconds
      const endTime = 45;   // seconds

      if (video) {
        video.addEventListener('loadedmetadata', () => {
          video.currentTime = startTime;
          video.play();
        });

        video.addEventListener('timeupdate', () => {
          if (video.currentTime >= endTime) {
            video.currentTime = startTime; // loop the clip
            video.play();
          }
        });

        // Try to play immediately (may be blocked by browser)
        video.play().catch(() => {
          console.log('Autoplay blocked - user interaction may be required');
        });
      }
    </script>
